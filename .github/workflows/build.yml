name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # LANGKAH BARU: Menginstal Gradle versi 9.3.1 secara otomatis
#    - name: Setup Gradle
 #     uses: gradle/actions/setup-gradle@v4
  #    with:
   #     gradle-version: '9.3.1'

    # Langkah membuat file .env dari GitHub Secrets
#    - name: Create .env file
 #     run: |
  #      cd myapp
   #     echo "MY_GEMINI_API_KEY=${{ secrets.MY_GEMINI_API_KEY }}" > .env

    # Langkah menghapus baris signingConfig
#    - name: Remove Debug Signing Config
 #     run: |
  #      cd myapp
   #     sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

    # PERUBAHAN: Menggunakan perintah 'gradle' langsung (bukan './gradlew')
    - name: Build with Gradle
      run: |
        cd myapp
        gradle wrapper --gradle-version
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: myapp/app/build/outputs/apk/debug/app-debug.apk
