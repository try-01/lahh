name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # LANGKAH BARU: Menginstal Gradle versi 9.3.1 secara otomatis
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    # Langkah membuat file .env dari GitHub Secrets
    - name: Create .env file
      run: |
        echo "MY_GEMINI_API_KEY=${{ secrets.MY_GEMINI_API_KEY }}" > .env

    # Langkah menghapus baris signingConfig
    - name: Remove Debug Signing Config
      run: |
        sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

    # PERUBAHAN: Menggunakan perintah 'gradle' langsung (bukan './gradlew')
    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
